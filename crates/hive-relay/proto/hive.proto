syntax = "proto3";

package hive;

// The Hive relay service — routes signed envelopes between TerranSoul devices.
service HiveRelay {
    // Submit a signed envelope (BUNDLE, OP, or JOB).
    rpc Submit(HiveEnvelope) returns (SubmitResponse);

    // Subscribe to messages destined for this device.
    rpc Subscribe(SubscribeRequest) returns (stream HiveEnvelope);

    // Claim a job from the relay queue.
    rpc ClaimJob(ClaimJobRequest) returns (ClaimJobResponse);

    // Complete a previously claimed job (submits result).
    rpc CompleteJob(CompleteJobRequest) returns (SubmitResponse);

    // Health / version check.
    rpc Health(Empty) returns (HealthResponse);
}

message HiveEnvelope {
    uint32 version = 1;
    MsgType msg_type = 2;
    string sender_id = 3;
    bytes sender_pubkey = 4;   // 32 bytes Ed25519 verifying key
    uint64 timestamp = 5;      // Unix-ms
    uint64 hlc_counter = 6;    // Hybrid Logical Clock
    bytes payload = 7;         // MessagePack-serialised body
    bytes signature = 8;       // 64 bytes Ed25519 signature
    bool compressed = 9;       // LZ4 compression flag
}

enum MsgType {
    MSG_TYPE_BUNDLE = 0;
    MSG_TYPE_OP = 1;
    MSG_TYPE_JOB = 2;
}

message SubscribeRequest {
    string device_id = 1;
    bytes public_key = 2;
    repeated Capability capabilities = 3;
    uint64 since_hlc = 4;
}

message Capability {
    string kind = 1;
    string value = 2;
}

message SubmitResponse {
    bool accepted = 1;
    string error = 2;  // non-empty if rejected
}

message ClaimJobRequest {
    string worker_id = 1;
    repeated Capability capabilities = 2;
}

message ClaimJobResponse {
    bool found = 1;
    HiveEnvelope job_envelope = 2;  // The JOB envelope if found
}

message CompleteJobRequest {
    string job_id = 1;
    string worker_id = 2;
    HiveEnvelope result_envelope = 3;  // The result BUNDLE
}

message Empty {}

message HealthResponse {
    string version = 1;
    uint64 connected_devices = 2;
    uint64 pending_jobs = 3;
}
