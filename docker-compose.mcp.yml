# TerranSoul MCP Mode — Docker Compose
#
# Runs the MCP tray brain server in a container, fully isolated
# from dev (port 1420/7422) and release (port 7421) modes.
#
# Usage:
#   npm run mcp:container          # build + start (detached)
#   npm run mcp:container:stop     # stop
#   npm run mcp:container:logs     # tail logs
#   npm run mcp:container:rebuild  # rebuild after code changes
#
# Data persists in the `terransoul-mcp-data` Docker volume across
# container rebuilds. To wipe: docker volume rm terransoul-mcp-data

services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: terransoul-mcp
    ports:
      - "7423:7423"
    volumes:
      - terransoul-mcp-data:/home/terransoul/mcp-data
    restart: unless-stopped
    environment:
      - TERRANSOUL_MCP_DATA_DIR=/home/terransoul/mcp-data
      - TERRANSOUL_MCP_PORT=7423
      - RUST_LOG=info
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7423/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  terransoul-mcp-data:
    name: terransoul-mcp-data
