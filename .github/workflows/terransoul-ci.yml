name: TerranSoul CI

on:
  push:

jobs:
  # ── Build + Lint + Test ─────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: ~/apt-cache
          key: apt-tauri-${{ runner.os }}-${{ hashFiles('.github/workflows/terransoul-ci.yml') }}

      - name: Install system dependencies (Tauri / WebKit)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # Restore cached .deb files if available
          if [ -d ~/apt-cache ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
          # Save .deb files for next run
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check and build frontend
        run: npm run build

      - name: Run cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run cargo test
        working-directory: src-tauri
        run: cargo test --all-targets

      - name: Run Vitest
        run: npm run test

      # ── Feature verification gate ─────────────────────────────────────────
      # These checks ensure that the critical features promised by the app
      # are actually implemented and testable, not just passing stub tests.
      - name: Verify desktop auto-configuration is tested
        run: |
          echo "Checking that brain auto-configuration tests exist and pass..."
          npx vitest run --reporter=verbose src/stores/brain.test.ts 2>&1 | tee /tmp/brain-test.log
          grep -q "autoConfigureForDesktop persists to Tauri backend" /tmp/brain-test.log || \
            (echo "❌ Missing test: autoConfigureForDesktop" && exit 1)
          grep -q "initialise succeeds even when Ollama commands fail" /tmp/brain-test.log || \
            (echo "❌ Missing test: initialise resilience" && exit 1)
          echo "✅ Brain auto-configuration tests verified"

      - name: Verify voice auto-configuration is tested
        run: |
          echo "Checking that voice auto-configuration tests exist and pass..."
          npx vitest run --reporter=verbose src/stores/voice.test.ts 2>&1 | tee /tmp/voice-test.log
          grep -q "autoConfigureVoice enables Web Speech API and Edge TTS" /tmp/voice-test.log || \
            (echo "❌ Missing test: voice auto-configuration" && exit 1)
          echo "✅ Voice auto-configuration tests verified"

      - name: Verify chat-based LLM switching is tested
        run: |
          echo "Checking that chat-based LLM switching tests exist and pass..."
          npx vitest run --reporter=verbose src/stores/conversation.test.ts 2>&1 | tee /tmp/conv-test.log
          grep -q 'detects "switch to groq"' /tmp/conv-test.log || \
            (echo "❌ Missing test: chat-based LLM switching" && exit 1)
          grep -q "switches to pollinations via chat command" /tmp/conv-test.log || \
            (echo "❌ Missing test: chat command integration" && exit 1)
          echo "✅ Chat-based LLM switching tests verified"

  # ── Playwright E2E ──────────────────────────────────────────────────────────
  playwright-e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
