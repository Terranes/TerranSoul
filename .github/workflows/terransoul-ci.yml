name: TerranSoul CI

on:
  push:

env:
  CARGO_INCREMENTAL: '0'
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUSTFLAGS: '-C debuginfo=0 -C strip=none'
  CARGO_TERM_COLOR: always

jobs:
  # ── Frontend: lint, build, unit tests ────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  # ── Rust: clippy + lib tests + postgres tests ───────────────────────────
  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: terransoul_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Tauri / WebKit)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --lib --tests --features postgres -- -D warnings

      - name: Build tests
        working-directory: src-tauri
        run: cargo test --lib --features postgres --no-run

      - name: Run lib tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Run postgres tests
        working-directory: src-tauri
        env:
          TEST_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/terransoul_test
        run: cargo test --features postgres -- --include-ignored --test-threads=1 memory::postgres


