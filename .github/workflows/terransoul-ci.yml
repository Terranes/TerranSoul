name: TerranSoul CI

on:
  push:
    branches: [main, 'copilot/**']
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - '.github/workflows/terransoul-ci.yml'

jobs:
  # ── Build + Lint + Test ─────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: ~/apt-cache
          key: apt-tauri-${{ runner.os }}-${{ hashFiles('.github/workflows/terransoul-ci.yml') }}

      - name: Install system dependencies (Tauri / WebKit)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # Restore cached .deb files if available
          if [ -d ~/apt-cache ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
          # Save .deb files for next run
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check and build frontend
        run: npm run build

      - name: Run cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run cargo test
        working-directory: src-tauri
        run: cargo test --all-targets

  # ── Vitest (frontend component tests) ──────────────────────────────────────
  vitest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test
