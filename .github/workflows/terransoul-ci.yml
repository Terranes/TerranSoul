name: TerranSoul CI

on:
  push:
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: '0'
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUSTFLAGS: '-C debuginfo=0 -C strip=none'
  CARGO_TERM_COLOR: always

jobs:
  # ── Change detection: avoid backend/WebKit work for unrelated pushes ─────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      postgres: ${{ steps.filter.outputs.postgres }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: filter
        name: Detect Rust/Postgres changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            rust=true
            postgres=true
            : > changed-files.txt
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" > changed-files.txt
            rust=true
            postgres=true
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt
            if grep -Eq '^(src-tauri/|crates/|mcp-data/shared/|Dockerfile\.mcp|docker-compose\.mcp\.yml)' changed-files.txt; then
              rust=true
            else
              rust=false
            fi
            if grep -Eq '^(src-tauri/Cargo\.(toml|lock)|src-tauri/src/memory/|src-tauri/src/ai_integrations/gateway\.rs|mcp-data/shared/)' changed-files.txt; then
              postgres=true
            else
              postgres=false
            fi
          fi

          echo "Changed files considered by backend gates:"
          cat changed-files.txt || true
          echo "rust=${rust}" >> "$GITHUB_OUTPUT"
          echo "postgres=${postgres}" >> "$GITHUB_OUTPUT"

  # ── Frontend: lint, build, unit tests ────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  # ── Rust: clippy + lib tests, Linux-only and skipped when unrelated ──────
  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: terransoul_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Tauri / WebKit)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
          version: tauri-webkit-4.1-v1
          execute_install_scripts: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --lib --tests --features postgres -- -D warnings

      - name: Build tests
        working-directory: src-tauri
        run: cargo test --lib --features postgres --no-run

      - name: Run lib tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Run postgres tests
        if: needs.changes.outputs.postgres == 'true'
        working-directory: src-tauri
        env:
          TEST_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/terransoul_test
        run: cargo test --features postgres -- --include-ignored --test-threads=1 memory::postgres


