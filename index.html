<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <!-- interactive-widget=overlays-content: virtual keyboard overlays the page
         instead of resizing it. Combined with the visualViewport composable in
         ChatView.vue, only the input footer slides up while the 3D model stays
         fixed. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content" />
    <title>TerranSoul</title>
  </head>
  <body>
    <div id="app">
      <!-- Inline loading indicator — visible immediately while JS bundles load.
           Removed automatically when Vue mounts and replaces #app innerHTML. -->
      <div id="preload-splash" style="
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #1a1028 0%, #0d0d1a 100%);
      ">
        <div style="text-align: center; color: #b8a0d8; font-family: system-ui, sans-serif;">
          <div style="
            width: 40px; height: 40px; margin: 0 auto 16px;
            border: 3px solid rgba(184, 160, 216, 0.2);
            border-top-color: #b8a0d8;
            border-radius: 50%;
            animation: preload-spin 0.8s linear infinite;
          "></div>
          <div style="font-size: 14px; opacity: 0.7;">Loading...</div>
        </div>
      </div>
      <style>
        @keyframes preload-spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
