<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="s5-title s5-desc">
  <title id="s5-title">Scene 5 — Alice shares her brain with Bob over LAN, on a Tuesday</title>
  <desc id="s5-desc">Flat illustration of two laptops on a kitchen table, Alice on the left and Bob on the right, a Wi-Fi arc between them, and a status panel showing "Alice — Vietnamese law notes · 192.168.1.42:7421 · token-required · read-only", a p95 latency chip, a confidence chip, and a benchmarks chip.</desc>

  <rect width="1200" height="675" fill="#0f172a"/>
  <rect x="0" y="510" width="1200" height="165" fill="#111827"/>
  <line x1="0" y1="510" x2="1200" y2="510" stroke="#1e293b" stroke-width="2"/>

  <!-- kitchen table -->
  <rect x="0" y="500" width="1200" height="20" fill="#7c6f5b"/>
  <rect x="0" y="510" width="1200" height="6" fill="#5d503f"/>

  <!-- two coffee mugs -->
  <rect x="80" y="466" width="50" height="40" rx="5" fill="#f1f5f9"/>
  <path d="M130 476 q14 0 14 14 q0 14 -14 14" fill="none" stroke="#f1f5f9" stroke-width="4"/>
  <ellipse cx="105" cy="468" rx="22" ry="4" fill="#7c2d12"/>
  <rect x="1060" y="466" width="50" height="40" rx="5" fill="#f1f5f9"/>
  <path d="M1110 476 q14 0 14 14 q0 14 -14 14" fill="none" stroke="#f1f5f9" stroke-width="4"/>
  <ellipse cx="1085" cy="468" rx="22" ry="4" fill="#7c2d12"/>

  <!-- Alice's laptop (left) -->
  <g>
    <polygon points="180,500 380,500 392,520 168,520" fill="#475569"/>
    <rect x="166" y="518" width="228" height="6" fill="#334155"/>
    <rect x="180" y="320" width="200" height="180" rx="8" fill="#1e293b" stroke="#334155" stroke-width="3"/>
    <rect x="190" y="330" width="180" height="160" rx="4" fill="#0f172a"/>
    <text x="200" y="350" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700">ALICE'S TERRANSOUL</text>
    <line x1="200" y1="358" x2="360" y2="358" stroke="#1e293b" stroke-width="2"/>
    <rect x="200" y="368" width="160" height="22" rx="11" fill="#123d31" stroke="#34d399"/>
    <text x="210" y="384" fill="#34d399" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700">Sharing</text>
    <text x="262" y="384" fill="#bfead8" font-family="Inter, Segoe UI, sans-serif" font-size="11">LAN brain on</text>
    <text x="200" y="406" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="10">Name:</text>
    <text x="200" y="420" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="11">Alice — Vietnamese law notes</text>
    <text x="200" y="438" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="10">Endpoint:</text>
    <text x="200" y="452" fill="#f1f5f9" font-family="JetBrains Mono, Consolas, monospace" font-size="11">192.168.1.42:7421</text>
    <text x="200" y="470" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="10">Auth:</text>
    <text x="234" y="470" fill="#fbbf24" font-family="Inter, Segoe UI, sans-serif" font-size="10">token-required · read-only</text>
  </g>

  <!-- Bob's laptop (right) -->
  <g>
    <polygon points="820,500 1020,500 1032,520 808,520" fill="#475569"/>
    <rect x="806" y="518" width="228" height="6" fill="#334155"/>
    <rect x="820" y="320" width="200" height="180" rx="8" fill="#1e293b" stroke="#334155" stroke-width="3"/>
    <rect x="830" y="330" width="180" height="160" rx="4" fill="#0f172a"/>
    <text x="840" y="350" fill="#60a5fa" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700">BOB'S TERRANSOUL</text>
    <line x1="840" y1="358" x2="1000" y2="358" stroke="#1e293b" stroke-width="2"/>
    <rect x="840" y="370" width="160" height="22" rx="6" fill="#172033" stroke="#334155"/>
    <text x="848" y="385" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="11">probation contract terms?</text>
    <rect x="840" y="398" width="160" height="38" rx="6" fill="#172033" stroke="#7c6fff"/>
    <text x="848" y="414" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="10">"Max 180 days for management;</text>
    <text x="848" y="428" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="10">salary ≥ 85% of role wage."</text>
    <text x="840" y="450" fill="#94a3b8" font-family="JetBrains Mono, Consolas, monospace" font-size="9">cite: lecture-4.txt · 0.91</text>
    <text x="840" y="464" fill="#94a3b8" font-family="JetBrains Mono, Consolas, monospace" font-size="9">cite: labour-code.pdf §6 · 0.84</text>
    <rect x="840" y="472" width="160" height="14" rx="3" fill="#0f172a"/>
    <text x="844" y="483" fill="#34d399" font-family="JetBrains Mono, Consolas, monospace" font-size="9">snippets only — no DB copy</text>
  </g>

  <!-- Wi-Fi arc + token shield between them -->
  <g>
    <path d="M390 380 Q600 200 810 380" fill="none" stroke="#7c6fff" stroke-width="3" stroke-dasharray="6 6"/>
    <circle cx="600" cy="276" r="40" fill="#172033" stroke="#7c6fff" stroke-width="3"/>
    <path d="M580 274 q20 -22 40 0" fill="none" stroke="#7c6fff" stroke-width="3" stroke-linecap="round"/>
    <path d="M588 282 q12 -14 24 0" fill="none" stroke="#7c6fff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="600" cy="290" r="3" fill="#7c6fff"/>
    <text x="600" y="334" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono, Consolas, monospace" font-size="11">UDP 7424 discover · HTTPS bearer · MCP brain_search</text>
  </g>

  <!-- Alice character -->
  <g class="cartoon-alice-small" transform="translate(110 290)" aria-label="Alice, friendly cartoon host">
    <ellipse cx="28" cy="132" rx="54" ry="9" fill="#020617" opacity="0.24"/>
    <path d="M-30 132 Q-24 70 -6 46 Q8 28 28 28 Q48 28 62 46 Q80 70 86 132 Z" fill="#7c6fff" stroke="#4f46e5" stroke-width="3.5" stroke-linejoin="round"/>
    <rect x="18" y="12" width="20" height="22" rx="9" fill="#f5d6c0" stroke="#e2b99a" stroke-width="2.5"/>
    <circle cx="28" cy="-7" r="35" fill="#f5d6c0" stroke="#e2b99a" stroke-width="3.5"/>
    <path d="M-7 -8 Q-4 -49 28 -53 Q63 -49 65 -8 Q52 -31 33 -31 Q8 -30 -7 -8 Z" fill="#3f3a52"/>
    <path d="M-4 -12 Q-6 18 6 34 Q5 6 16 -22 Z" fill="#3f3a52"/>
    <path d="M62 -12 Q63 18 50 34 Q52 6 40 -22 Z" fill="#3f3a52"/>
    <ellipse cx="17" cy="-5" rx="4.4" ry="6.2" fill="#0f172a"/>
    <ellipse cx="40" cy="-5" rx="4.4" ry="6.2" fill="#0f172a"/>
    <circle cx="18.5" cy="-8" r="1.5" fill="#fff"/>
    <circle cx="41.5" cy="-8" r="1.5" fill="#fff"/>
    <circle cx="8" cy="9" r="4" fill="#f9a8d4" opacity="0.58"/>
    <circle cx="49" cy="9" r="4" fill="#f9a8d4" opacity="0.58"/>
    <path d="M17 15 q12 8 23 0" fill="none" stroke="#0f172a" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M68 68 q16 8 32 4" fill="none" stroke="#7c6fff" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Bob character -->
  <g class="cartoon-bob-small" transform="translate(1080 290)" aria-label="Bob, curious cartoon coworker">
    <ellipse cx="28" cy="132" rx="54" ry="9" fill="#020617" opacity="0.24"/>
    <path d="M-30 132 Q-24 70 -6 46 Q8 28 28 28 Q48 28 62 46 Q80 70 86 132 Z" fill="#60a5fa" stroke="#2563eb" stroke-width="3.5" stroke-linejoin="round"/>
    <rect x="18" y="12" width="20" height="22" rx="9" fill="#f5d6c0" stroke="#e2b99a" stroke-width="2.5"/>
    <circle cx="28" cy="-7" r="35" fill="#f5d6c0" stroke="#e2b99a" stroke-width="3.5"/>
    <path d="M-5 -11 Q-2 -45 28 -50 Q59 -45 62 -11 Q49 -28 31 -28 Q10 -28 -5 -11 Z" fill="#5b4636"/>
    <path d="M2 -34 Q28 -49 56 -24" fill="none" stroke="#7a5d48" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <ellipse cx="17" cy="-5" rx="4.4" ry="6.2" fill="#0f172a"/>
    <ellipse cx="40" cy="-5" rx="4.4" ry="6.2" fill="#0f172a"/>
    <circle cx="18.5" cy="-8" r="1.5" fill="#fff"/>
    <circle cx="41.5" cy="-8" r="1.5" fill="#fff"/>
    <circle cx="8" cy="9" r="4" fill="#f9a8d4" opacity="0.5"/>
    <circle cx="49" cy="9" r="4" fill="#f9a8d4" opacity="0.5"/>
    <circle cx="17" cy="-4" r="8" fill="none" stroke="#0f172a" stroke-width="2"/>
    <circle cx="40" cy="-4" r="8" fill="none" stroke="#0f172a" stroke-width="2"/>
    <line x1="25" y1="-4" x2="32" y2="-4" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    <path d="M17 15 q12 7 23 0" fill="none" stroke="#0f172a" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M-12 68 q-16 8 -32 4" fill="none" stroke="#60a5fa" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- top: SLO chips -->
  <g>
    <text x="600" y="64" text-anchor="middle" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">THE TUESDAY-AFTERNOON SCENE</text>
    <!-- speed -->
    <rect x="100" y="86" width="320" height="100" rx="10" fill="#111827" stroke="#1e293b"/>
    <text x="118" y="110" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700">FAST</text>
    <text x="118" y="134" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">p95 latency 240 ms</text>
    <text x="118" y="154" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="11">RRF fusion + per-shard HNSW + caches</text>
    <rect x="118" y="160" width="78" height="20" rx="10" fill="#172033" stroke="#34d399"/>
    <text x="128" y="174" fill="#34d399" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">cache hit</text>
    <rect x="200" y="160" width="74" height="20" rx="10" fill="#172033" stroke="#7c6fff"/>
    <text x="210" y="174" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">parallel</text>
    <rect x="278" y="160" width="78" height="20" rx="10" fill="#172033" stroke="#fbbf24"/>
    <text x="288" y="174" fill="#fbbf24" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">graceful</text>
  </g>

  <!-- honest -->
  <g>
    <rect x="440" y="86" width="320" height="100" rx="10" fill="#111827" stroke="#1e293b"/>
    <text x="458" y="110" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700">HONEST</text>
    <text x="458" y="134" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">confidence + decay + receipts</text>
    <text x="458" y="154" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="11">legal facts versioned; never silently overwritten</text>
    <rect x="458" y="160" width="98" height="20" rx="10" fill="#172033" stroke="#34d399"/>
    <text x="468" y="174" fill="#34d399" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">conf 0.91</text>
    <rect x="560" y="160" width="84" height="20" rx="10" fill="#172033" stroke="#fbbf24"/>
    <text x="572" y="174" fill="#fbbf24" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">decayed</text>
    <rect x="648" y="160" width="84" height="20" rx="10" fill="#172033" stroke="#7c6fff"/>
    <text x="660" y="174" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">cite line 24</text>
  </g>

  <!-- measurable -->
  <g>
    <rect x="780" y="86" width="320" height="100" rx="10" fill="#111827" stroke="#1e293b"/>
    <text x="798" y="110" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700">MEASURABLE</text>
    <text x="798" y="134" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">public benchmarks, wins + ties</text>
    <text x="798" y="154" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="11">LongMemEval-S · LoCoMo MTEB · agentmemory</text>
    <rect x="798" y="160" width="84" height="20" rx="10" fill="#172033" stroke="#34d399"/>
    <text x="810" y="174" fill="#34d399" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">recall +6%</text>
    <rect x="886" y="160" width="78" height="20" rx="10" fill="#172033" stroke="#fbbf24"/>
    <text x="896" y="174" fill="#fbbf24" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">tie tones</text>
    <rect x="968" y="160" width="118" height="20" rx="10" fill="#172033" stroke="#7c6fff"/>
    <text x="978" y="174" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="10" font-weight="700">on for clauses only</text>
  </g>

  <!-- caption strip -->
  <rect x="60" y="540" width="1080" height="100" rx="12" fill="#111827" stroke="#1e293b"/>
  <text x="84" y="572" fill="#7c6fff" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">SCENE 5 · HYBRID MEMORY AT SCALE</text>
  <text x="84" y="598" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">Bob asks. Alice's brain answers — across the kitchen table, with receipts.</text>
  <text x="84" y="622" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="13">LAN MCP brain sharing · ranked snippets, not the database · the most-private rule wins.</text>
</svg>
